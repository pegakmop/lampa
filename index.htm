<!-- iOS Fix -->
<script>
var _orig = document.createElement.bind(document);
document.createElement = function(tag) {
    var el = _orig(tag);
    if (tag.toLowerCase() === 'video') {
        el.setAttribute('playsinline', '');
        el.setAttribute('webkit-playsinline', '');
        el.setAttribute('x-webkit-airplay', 'allow');
        el.setAttribute('webkit-allows-inline-media-playback', '');
    }
    return el;
};
</script>

<script>
(function(){
    function initPiP(){
        var app = document.getElementById('app');
        if(!app) return;

        new MutationObserver(function(){
            var video = document.querySelector('video');
            if(video && !video._pipInit){
                video._pipInit = true;

                var btn = document.createElement('button');
                btn.innerHTML = '⧉';
                btn.style.cssText = 'position:fixed;bottom:80px;right:20px;z-index:999999;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:22px;cursor:pointer;';
                document.body.appendChild(btn);

                btn.addEventListener('click', function(){
                    var v = document.querySelector('video');
                    if(!v) return;

                    if('mediaSession' in navigator){
                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: 'фоновое воспроизведение',
                            artist: (document.querySelector('.head-backward__title') && document.querySelector('.head-backward__title').textContent.trim()) || ''
                        });
                        navigator.mediaSession.setActionHandler('play', function(){ v.play(); });
                        navigator.mediaSession.setActionHandler('pause', function(){ v.pause(); });
                    }

                    if(v.webkitSupportsPresentationMode && v.webkitSupportsPresentationMode('picture-in-picture')){
                        v.webkitSetPresentationMode('picture-in-picture');
                    } else if(document.pictureInPictureEnabled){
                        v.requestPictureInPicture().catch(function(){});
                    }
                });
            }
        }).observe(app, {childList:true, subtree:true});
    }

    // Ждём загрузки DOM
    if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', initPiP);
    } else {
        initPiP();
    }
})();
</script>

    <script>
        var lampa_url     = '';
        var cache_version = Math.floor((new Date()).getTime() / 9e5); // Новое значение каждые 15 минут
            
        function urlJoin(base, add) {
            if (base.charAt(base.length - 1) !== '/') {
                base += '/'
            }

            return base + add
        }

        function putScript(scripts, onload, onerror){
            var add = function(src){
                console.log('Loader', 'try-load-script', src)

                var trys = 0

                var sreateScript = function(){
                    var script = document.createElement('script')

                    script.type = 'text/javascript'

                    script.onload = script.onreadystatechange = function(e) {
                        console.log('Loader', 'Script loaded', e)

                        if (!!onload) onload()
                    };

                    script.onerror = function(){
                        trys++

                        console.log('Loader', 'error-load-script', src)

                        if(trys < 3){
                            sreateScript()
                        } else if (!!onerror) {
                            onerror()
                        } else{
                            $('.no-network').removeClass('hide')

                            $('.no-network__file').text(window.location.href + '/' + src)
                        }
                    }

                    script.src = src

                    document.getElementsByTagName('body')[0].appendChild(script)
                }

                sreateScript()
            }

            add(scripts)
        }

        function loadCurrentLampa() {
            putScript('app.min.js?v=' + cache_version, function () {})
        }

        function loadLocalLampa(){
            if(lampa_url !== '') window.local_lampa = true

            loadCurrentLampa()
        }

        if (typeof AndroidJS !== "undefined"
            && !!AndroidJS.getLampaURL
            && /^https?:\/\//i.test(AndroidJS.getLampaURL())
            && !/^https?:\/\//i.test(location.href)
        ) {
            lampa_url = urlJoin(AndroidJS.getLampaURL(),'')
        }

        if (lampa_url !== '') {
            putScript(
                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                false,
                function(){}
            )

            putScript(
                urlJoin(lampa_url, 'app.min.js?v=' + cache_version),
                function () {
                    var css = urlJoin(lampa_url, 'css/app.css?v=' + cache_version)

                    $('head').append('<link rel="stylesheet" href="' + css + '">')
                },
                function () {
                    putScript(
                        urlJoin(lampa_url, 'lampa-main/app.min.js?v=' + cache_version),
                        function () {
                            var css = urlJoin(lampa_url, 'lampa-main/css/app.css?v=' + cache_version)

                            $('head').append('<link rel="stylesheet" href="' + css + '">')

                            putScript(
                                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                                false,
                                function(){}
                            )
                        },
                        loadLocalLampa
                    )
                }
            )
        }
        else{
            loadCurrentLampa()
        }
    </script>
