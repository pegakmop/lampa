    <script>
        var lampa_url     = '';
        var cache_version = Math.floor((new Date()).getTime() / 9e5); // Новое значение каждые 15 минут
            
        function urlJoin(base, add) {
            if (base.charAt(base.length - 1) !== '/') {
                base += '/'
            }

            return base + add
        }

        function putScript(scripts, onload, onerror){
            var add = function(src){
                console.log('Loader', 'try-load-script', src)

                var trys = 0

                var sreateScript = function(){
                    var script = document.createElement('script')

                    script.type = 'text/javascript'

                    script.onload = script.onreadystatechange = function(e) {
                        console.log('Loader', 'Script loaded', e)

                        if (!!onload) onload()
                    };

                    script.onerror = function(){
                        trys++

                        console.log('Loader', 'error-load-script', src)

                        if(trys < 3){
                            sreateScript()
                        } else if (!!onerror) {
                            onerror()
                        } else{
                            $('.no-network').removeClass('hide')

                            $('.no-network__file').text(window.location.href + '/' + src)
                        }
                    }

                    script.src = src

                    document.getElementsByTagName('body')[0].appendChild(script)
                }

                sreateScript()
            }

            add(scripts)
        }

        function loadCurrentLampa() {
            putScript('app.min.js?v=' + cache_version, function () {})
        }

        function loadLocalLampa(){
            if(lampa_url !== '') window.local_lampa = true

            loadCurrentLampa()
        }

        if (typeof AndroidJS !== "undefined"
            && !!AndroidJS.getLampaURL
            && /^https?:\/\//i.test(AndroidJS.getLampaURL())
            && !/^https?:\/\//i.test(location.href)
        ) {
            lampa_url = urlJoin(AndroidJS.getLampaURL(),'')
        }

        if (lampa_url !== '') {
            putScript(
                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                false,
                function(){}
            )

            putScript(
                urlJoin(lampa_url, 'app.min.js?v=' + cache_version),
                function () {
                    var css = urlJoin(lampa_url, 'css/app.css?v=' + cache_version)

                    $('head').append('<link rel="stylesheet" href="' + css + '">')
                },
                function () {
                    putScript(
                        urlJoin(lampa_url, 'lampa-main/app.min.js?v=' + cache_version),
                        function () {
                            var css = urlJoin(lampa_url, 'lampa-main/css/app.css?v=' + cache_version)

                            $('head').append('<link rel="stylesheet" href="' + css + '">')

                            putScript(
                                urlJoin(lampa_url, 'lampainit.js?v=' + cache_version),
                                false,
                                function(){}
                            )
                        },
                        loadLocalLampa
                    )
                }
            )
        }
        else{
            loadCurrentLampa()
        }
    </script>
<!-- PiP (Picture-in-Picture) -->
<script>
(function(){
    var pipBtn;

    function createPipBtn(){
        if(document.getElementById('pip-btn')) return;
        pipBtn = document.createElement('button');
        pipBtn.id = 'pip-btn';
        pipBtn.innerHTML = '⧉';
        pipBtn.title = 'Картинка в картинке';
        pipBtn.style.cssText = [
            'position:fixed',
            'bottom:80px',
            'right:20px',
            'z-index:999998',
            'background:rgba(0,0,0,0.75)',
            'color:#fff',
            'border:none',
            'border-radius:10px',
            'padding:10px 14px',
            'font-size:22px',
            'cursor:pointer',
            'display:none',
            'backdrop-filter:blur(6px)',
            '-webkit-backdrop-filter:blur(6px)',
            'box-shadow:0 4px 20px rgba(0,0,0,0.5)',
            'transition:opacity 0.3s'
        ].join(';');
        document.body.appendChild(pipBtn);

        pipBtn.addEventListener('click', function(){
            var video = document.querySelector('video');
            if(!video) return;
            if(document.pictureInPictureElement){
                document.exitPictureInPicture().catch(function(){});
            } else if(document.pictureInPictureEnabled){
                video.requestPictureInPicture().catch(function(e){
                    console.warn('PiP:', e);
                });
            }
        });
    }

    function watchVideo(){
        var app = document.getElementById('app');
        if(!app) return;

        var checkVideo = function(){
            var video = document.querySelector('video');
            if(video && document.pictureInPictureEnabled){
                if(pipBtn) pipBtn.style.display = 'block';
                if(!video._pipListened){
                    video._pipListened = true;
                    document.addEventListener('visibilitychange', function(){
                        var v = document.querySelector('video');
                        if(!v) return;
                        if(document.visibilityState === 'hidden' && !document.pictureInPictureElement && !v.paused){
                            v.requestPictureInPicture().catch(function(){});
                        }
                        if(document.visibilityState === 'visible' && document.pictureInPictureElement){
                            document.exitPictureInPicture().catch(function(){});
                        }
                    });
                }
            } else {
                if(pipBtn) pipBtn.style.display = 'none';
            }
        };

        new MutationObserver(checkVideo).observe(app, { childList:true, subtree:true });
        setInterval(checkVideo, 2000);
    }

    function init(){
        createPipBtn();
        watchVideo();
    }

    var authWall = document.getElementById('auth-wall');
    if(!authWall){ init(); return; }

    // Ждём удаления auth-wall из DOM
    new MutationObserver(function(mutations){
        mutations.forEach(function(m){
            m.removedNodes.forEach(function(node){
                if(node.id === 'auth-wall') init();
            });
        });
    }).observe(document.body, { childList:true });

    // Или появления класса auth-hide
    new MutationObserver(function(){
        if(authWall.classList.contains('auth-hide')){
            setTimeout(init, 600);
        }
    }).observe(authWall, { attributes:true, attributeFilter:['class'] });

})();
</script>
